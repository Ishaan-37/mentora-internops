# docker-compose.yml
# Local development setup for InternOps
# Starts PostgreSQL + the backend API
# Frontend runs separately via: cd frontend && npm run dev
#
# Usage:
#   docker compose up -d          # start services
#   docker compose logs -f api    # watch API logs
#   docker compose down -v        # stop + wipe volumes

version: '3.9'

services:
  # ------------------------------------------------------------------
  # PostgreSQL database
  # ------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    container_name: internops_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       internops
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres_dev_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d internops"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ------------------------------------------------------------------
  # Node.js backend API
  # ------------------------------------------------------------------
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: internops_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV:               development
      PORT:                   5000
      DATABASE_URL:           postgres://postgres:postgres_dev_password@db:5432/internops
      JWT_SECRET:             dev_jwt_secret_change_in_production
      JWT_REFRESH_SECRET:     dev_refresh_secret_change_in_production
      JWT_EXPIRES_IN:         1h
      JWT_REFRESH_EXPIRES_IN: 7d
      BCRYPT_ROUNDS:          10
      CORS_ORIGINS:           http://localhost:3000,http://localhost:5173
      MAX_FILE_SIZE_MB:       10
      UPLOAD_DIR:             /app/uploads
      TZ:                     Asia/Kolkata
    volumes:
      - ./backend:/app
      - /app/node_modules          # anonymous volume keeps container's node_modules
      - uploads_data:/app/uploads
    ports:
      - "5000:5000"

volumes:
  postgres_data:
  uploads_data:
